name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    name: xenv core tests (sh + dash)
    steps:
      - uses: actions/checkout@v4
      - name: install dash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dash
      - name: run tests under /bin/sh
        run: test/run.sh
      - name: run tests under /usr/bin/dash
        run: SHELL_BIN=/usr/bin/dash test/run.sh

  recipes:
    runs-on: ubuntu-latest
    name: recipe round-trip tests (python, node, ruby, go, rust, php, java, csharp, elixir)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.3' }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - uses: erlef/setup-beam@v1
        with: { otp-version: '27', elixir-version: '1.17' }
      - name: install php (for the gemini-built recipe)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq php-cli
      # Rust is preinstalled on ubuntu-latest via rustup; no setup needed.
      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            recipes/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('recipes/rust/Cargo.toml') }}
      - name: build recipes
        run: recipes/build
      - name: run recipe test rig
        run: recipes/test
