name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell:
    runs-on: ubuntu-latest
    name: xenv core tests (sh + dash)
    steps:
      - uses: actions/checkout@v4
      - name: install dash
        run: sudo apt-get update -qq && sudo apt-get install -y -qq dash
      - name: run tests under /bin/sh
        run: test/run.sh
      - name: run tests under /usr/bin/dash
        run: SHELL_BIN=/usr/bin/dash test/run.sh

  loaders:
    runs-on: ubuntu-latest
    name: loader round-trip tests (python, node, go, rust)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      # Rust is preinstalled on ubuntu-latest via rustup; no setup needed.
      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            loaders/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('loaders/rust/Cargo.toml') }}
      - name: prefetch go deps
        run: cd loaders/go && go mod tidy
      - name: run loader rig
        run: loaders/test.sh
