name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun test
      - run: bun run build:all

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
